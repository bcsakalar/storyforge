services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: storyforge
      POSTGRES_USER: storyforge
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U storyforge -d storyforge"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.50'

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${BACKEND_BIND:-127.0.0.1}:3004:3004"
    env_file:
      - .env
    volumes:
      - uploads:/app/uploads
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.75'
    environment:
      DATABASE_URL: postgresql://storyforge:${POSTGRES_PASSWORD}@db:5432/storyforge?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3004
      FIREBASE_SERVICE_ACCOUNT_PATH: ${FIREBASE_SERVICE_ACCOUNT_PATH:-}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      REDIS_URL: redis://redis:6379

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'

volumes:
  pgdata:
  redis_data:
  uploads:
